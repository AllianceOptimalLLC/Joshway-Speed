<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOSHWAY SPEED</title>
  <style>
    body { margin: 0; background: #112; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
    canvas { border: 4px solid #facc15; image-rendering: pixelated; }
    .title { font-size: 36px; color: #f97316; text-shadow: 3px 3px 0 #000; margin: 8px; }
    .hud { font-size: 18px; color: #4ade80; margin: 4px; }
    .controls { font-size: 12px; margin: 4px; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="title">JOSHWAY SPEED</div>
  <div class="hud">RINGS: <span id="rings">000</span> | TIME: <span id="time">00</span> | SCORE: <span id="score">000000</span></div>
  <canvas id="game" width="800" height="450"></canvas>
  <div class="controls">SPACE / UP: Jump | DOWN: Spin | Arrow keys or WASD to move | Collect Star Rings in beautiful worlds!</div>
  <script type="module" src="/main.js"></script>
</body>
</html>
